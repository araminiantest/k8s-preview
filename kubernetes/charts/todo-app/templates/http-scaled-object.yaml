{{- if .Values.preview.enabled }}
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: {{ include "todo-app.fullname" . }}
  namespace: {{ include "todo-app.namespace" . }}
spec:
  hosts:
    - {{ printf "todo-%s-pr.%s.sslip.io" (toString .Values.preview.PRNumber) .Values.istioLoadBalancerIP }}
  scaleTargetRef:
    name: {{ include "todo-app.fullname" . }}
    kind: Deployment
    apiVersion: apps/v1
    service: {{ include "todo-app.fullname" . }}
    port: {{ .Values.service.port }}
  replicas:
    min: 0
    max: 2
  # The period to wait after the last reported active before scaling the resource back to 0.
  scaledownPeriod: 300
  scalingMetric:
    requestRate:
      granularity: 1s
      # targetValue: This is the target value for the scaling configuration.
      targetValue: 1
      window: 1m0s
{{- end }}