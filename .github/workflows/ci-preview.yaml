name: ci-preview
permissions:
  contents: write
  pull-requests: write
  id-token: write

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

env:
  GIT_PR_NUMBER: ${{ github.event.number }}
  PR_EVENT_TYPE: ${{ github.event.action }}

jobs:
  build:
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: yokawasa/action-setup-kube-tools@3e3886c11bfa25fe33f8eb90f59542dd151da442 # v0.13.1
        with:
          setup-tools: |
            skaffold
          skaffold: '2.17.1'

      - name: Build and Push Docker Image
        run: |
          make build

  render:
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: yokawasa/action-setup-kube-tools@3e3886c11bfa25fe33f8eb90f59542dd151da442 # v0.13.1
        with:
          setup-tools: |
            skaffold
            helm
          skaffold: '2.17.1'
          helm: '3.19.0'

      - name: Render Preview Manifests
        run: |
          make render-preview

      - name: Push Manifest to Branch 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: manifests/preview/${{ env.GIT_PR_NUMBER }}
          branch: preview-${{ env.GIT_PR_NUMBER }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              labels: [process.env.LABEL],
            })
        env:
          PR_NUMBER: ${{ env.GIT_PR_NUMBER }}
          LABEL: preview

      - name: Comment PR
        uses: ./.github/actions/pr-comment
        with:
          git_access_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ env.GIT_PR_NUMBER }}
          # TODO: Replace it with the actual IP of the load balancer (run `minikube tunnel` to get the IP)
          istio_load_balancer_ip: 127.0.0.1.sslip.io
          git_rev: ${{ steps.short-sha.outputs.sha }}
          service_name: todo

  delete-preview:
    if: ${{ github.event.action == 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete Preview Branch
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: preview-${{ env.GIT_PR_NUMBER }}
